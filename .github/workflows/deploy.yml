# Build the VitePress book and deploy it to GitHub Pages.
#
# One-time repo setup (Settings → Pages):
#   Build and deployment → Source → "GitHub Actions"
#
# After that, every push to `main` (or the working branch below) publishes
# the site at https://theonize.github.io/State_of_The_Art/
name: Deploy book to GitHub Pages

on:
  push:
    branches:
      - main
      # Working branch — lets the book deploy for preview before it is merged.
      - claude/epic-lovelace-p64dgd
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so VitePress "last updated" works
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # NOTE: Pages must be enabled once before this succeeds —
      # Settings → Pages → Build and deployment → Source → "GitHub Actions".
      # (This org does not permit the workflow token to enable Pages
      # automatically, so it has to be done by a repo admin in the UI.)
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
